name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        default: "1.0.0"
      build_number:
        description: "Build number"
        required: true
        default: "1"

env:
  FLUTTER_VERSION: "3.41.2"

jobs:
  # ============================================
  # Android Build Job
  # ============================================
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code with build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Inject server URL (if configured)
        env:
          SONIC_SERVER_URL: ${{ secrets.SONIC_SERVER_URL }}
        run: |
          if [ -n "$SONIC_SERVER_URL" ]; then
            sed -i "s|final _urlController = TextEditingController();|final _urlController = TextEditingController(text: '$SONIC_SERVER_URL');|g" \
              lib/ui/screens/server_config_screen.dart
            echo "Server URL injected successfully"
          else
            echo "No SONIC_SERVER_URL secret configured, skipping injection"
          fi

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build Android Debug APK
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          BUILD_NUMBER=${{ github.event.inputs.build_number || '1' }}
          flutter build apk --debug --build-name=$VERSION --build-number=$BUILD_NUMBER

      - name: Build Android Release APK
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          BUILD_NUMBER=${{ github.event.inputs.build_number || '1' }}
          flutter build apk --release --build-name=$VERSION --build-number=$BUILD_NUMBER

      - name: Rename Android Debug APK
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/emosonic_android_v${VERSION}_debug.apk

      - name: Rename Android Release APK
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/emosonic_android_v${VERSION}.apk

      - name: Upload Android Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/emosonic_android_v*_debug.apk

      - name: Upload Android Release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/emosonic_android_v*.apk

  # ============================================
  # Windows Build Job
  # ============================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code with build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Inject server URL (if configured)
        env:
          SONIC_SERVER_URL: ${{ secrets.SONIC_SERVER_URL }}
        shell: pwsh
        run: |
          if ($env:SONIC_SERVER_URL) {
            (Get-Content lib/ui/screens/server_config_screen.dart) -replace `
              "final _urlController = TextEditingController();", `
              "final _urlController = TextEditingController(text: '$env:SONIC_SERVER_URL');" | `
              Set-Content lib/ui/screens/server_config_screen.dart
            Write-Host "Server URL injected successfully"
          } else {
            Write-Host "No SONIC_SERVER_URL secret configured, skipping injection"
          }

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF -like 'refs/tags/v*') { 
            $env:GITHUB_REF -replace 'refs/tags/v', '' 
          } else { 
            $env:INPUT_VERSION 
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Build Windows Release
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          $buildNumber = if ($env:INPUT_BUILD_NUMBER) { $env:INPUT_BUILD_NUMBER } else { "1" }
          flutter build windows --release --build-name=$version --build-number=$buildNumber

      - name: Package Windows EXE
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          $buildDir = "build/windows/x64/runner/Release"
          $outputName = "emosonic_windows_v${version}"

          # Create zip archive
          Compress-Archive -Path "$buildDir\*" -DestinationPath "${outputName}.zip" -Force

          Write-Host "Windows build packaged as ${outputName}.zip"

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: emosonic_windows_*.zip

  # ============================================
  # Create Release
  # ============================================
  create-release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Android Debug APK
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
          path: ./artifacts/android

      - name: Download Android Release APK
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: ./artifacts/android

      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: ./artifacts/windows

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.get_version.outputs.version }}
          tag_name: v${{ steps.get_version.outputs.version }}
          body: |
            ## EmoSonic v${{ steps.get_version.outputs.version }}

            ### Downloads

            - **Android Debug APK**: `emosonic_android_v${{ steps.get_version.outputs.version }}_debug.apk` (for testing)
            - **Android Release APK**: `emosonic_android_v${{ steps.get_version.outputs.version }}.apk` (recommended for daily use)
            - **Windows**: `emosonic_windows_v${{ steps.get_version.outputs.version }}.zip`

            ### Installation

            **Android:**
            1. Download `emosonic_android_v${{ steps.get_version.outputs.version }}.apk`
            2. Enable "Install from Unknown Sources" in Settings
            3. Install the APK

            **Windows:**
            1. Download and extract the ZIP file
            2. Run `emosonic.exe`

            ### Server Configuration

            On first launch, enter your Subsonic server details:
            - Server URL
            - Username
            - Password
          files: |
            ./artifacts/android/emosonic_android_v${{ steps.get_version.outputs.version }}_debug.apk
            ./artifacts/android/emosonic_android_v${{ steps.get_version.outputs.version }}.apk
            ./artifacts/windows/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
